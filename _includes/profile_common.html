<!--
  Shared CSS and JS for profile pages (author.md, institution.md).
  Provides: search/autocomplete, share button, URL bar management, utility functions.
  Usage: include profile_common.html (with liquid curly-percent tags)
-->
<style>
/* Search box */
.profile-search-box { padding:8px 14px; font-size:1em; width:100%; max-width:480px; border:1px solid #ccc; border-radius:4px; }
/* Autocomplete results */
.profile-search-results { list-style:none; padding:0; margin:4px 0 0 0; max-height:260px; overflow-y:auto; border:1px solid #ddd; border-radius:4px; display:none; position:absolute; background:#fff; z-index:100; width:100%; max-width:480px; }
.profile-search-results li { padding:8px 14px; cursor:pointer; border-bottom:1px solid #f0f0f0; }
.profile-search-results li:hover, .profile-search-results li.active { background:#e8f4f8; }
.profile-search-results .sr-detail { font-size:0.82em; color:#666; }
/* Profile layout */
.profile-container { display:none; margin-top:20px; }
.profile-header { margin-bottom:18px; }
.profile-header h2 { margin-bottom:2px; display:inline; }
.profile-header .affil { color:#555; font-size:0.95em; }
/* Score cards */
.score-cards { display:flex; flex-wrap:wrap; gap:12px; margin:16px 0; }
.score-card { background:#f7f7f7; border:1px solid #e0e0e0; border-radius:6px; padding:12px 18px; min-width:110px; text-align:center; }
.score-card .val { font-size:1.6em; font-weight:bold; color:#2c3e50; }
.score-card .lbl { font-size:0.78em; color:#777; margin-top:2px; }
/* Badges */
.badge-tag { display:inline-block; padding:2px 8px; border-radius:3px; font-size:0.8em; margin:1px 2px; color:#fff; }
.badge-available { background:#3498db; }
.badge-functional { background:#27ae60; }
.badge-reproducible, .badge-reproduced, .badge-reusable { background:#8e44ad; }
/* Chart */
.chart-container { max-width:1050px; margin:16px 0; }
/* Loading */
.profile-loading { color:#888; font-style:italic; }
/* Share button */
.share-btn { display:none; margin-left:10px; padding:3px 10px; font-size:0.7em; cursor:pointer; background:#f0f0f0; border:1px solid #ccc; border-radius:4px; color:#555; vertical-align:middle; position:relative; }
.share-btn:hover { background:#e0e0e0; }
.share-btn .share-tip { display:none; position:absolute; bottom:125%; left:50%; transform:translateX(-50%); background:#333; color:#fff; font-size:0.85em; padding:4px 8px; border-radius:4px; white-space:nowrap; z-index:100; pointer-events:none; }
.share-btn.copied .share-tip { display:block; }
/* Tables (shared) */
.profile-table { font-size:0.88em; border-collapse:collapse; width:100%; margin:10px 0; }
.profile-table th, .profile-table td { padding:6px 10px; border:1px solid #ddd; text-align:left; }
.profile-table th { background:#f2f2f2; white-space:nowrap; }
.profile-table tr:nth-child(even) { background:#fafafa; }
</style>

<script>
/**
 * ReproDBProfile — shared utilities for author & institution profile pages.
 * Provides: escHtml, cleanName, badgeHtml, card, initSearch.
 */
var ReproDBProfile = (function() {
  'use strict';

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function cleanName(n) {
    return (n || '').replace(/\s+\d{4}$/, '').replace(/\t/g, ' ');
  }

  function badgeHtml(badges) {
    if (!badges) return '';
    var list = Array.isArray(badges) ? badges : badges.split(',');
    return list.map(function(b) {
      var bl = b.trim().toLowerCase();
      var cls = 'badge-available';
      var label = b.trim().replace(/^Badges:\s*/i, '');
      if (bl.indexOf('functional') >= 0) cls = 'badge-functional';
      else if (bl.indexOf('reproduc') >= 0 || bl.indexOf('reusable') >= 0) cls = 'badge-reproducible';
      return '<span class="badge-tag ' + cls + '">' + escHtml(label) + '</span>';
    }).join(' ');
  }

  function card(value, label) {
    return '<div class="score-card"><div class="val">' + value + '</div><div class="lbl">' + label + '</div></div>';
  }

  /**
   * Initialise search/autocomplete, share button, and URL management.
   *
   * cfg.searchBoxId      – <input> element ID
   * cfg.resultsListId    – <ul> autocomplete list ID
   * cfg.shareBtnId       – share <span> element ID
   * cfg.loadingId        – loading message element ID
   * cfg.maxResults       – max autocomplete items (default 30)
   * cfg.filterItems(q)   – return array of matching items for query string q
   * cfg.renderResult(item) – return {key: string, html: string}
   * cfg.onSelect(key)    – render profile; return {displayValue, urlParams?} or null
   * cfg.resolveFromUrl(params) – return {key, displayValue} | {search: string} | null
   */
  function initSearch(cfg) {
    var searchBox = document.getElementById(cfg.searchBoxId);
    var resultsList = document.getElementById(cfg.resultsListId);
    var shareBtn = document.getElementById(cfg.shareBtnId);
    var maxResults = cfg.maxResults || 30;
    var activeIdx = -1;

    function showShare() {
      if (shareBtn) shareBtn.style.display = 'inline-block';
    }

    if (shareBtn) {
      shareBtn.addEventListener('click', function() {
        var url = window.location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(function() { flashCopied(); });
        } else {
          var ta = document.createElement('textarea');
          ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta); ta.select();
          document.execCommand('copy'); document.body.removeChild(ta);
          flashCopied();
        }
      });
    }

    function flashCopied() {
      if (!shareBtn) return;
      shareBtn.classList.add('copied');
      setTimeout(function() { shareBtn.classList.remove('copied'); }, 1500);
    }

    function showResults(matches) {
      resultsList.innerHTML = '';
      if (matches.length === 0) { resultsList.style.display = 'none'; return; }
      activeIdx = -1;
      var shown = matches.slice(0, maxResults);
      for (var i = 0; i < shown.length; i++) {
        var item = cfg.renderResult(shown[i]);
        var li = document.createElement('li');
        li.dataset.key = item.key;
        li.innerHTML = item.html;
        li.addEventListener('click', function() { doSelect(this.dataset.key); });
        resultsList.appendChild(li);
      }
      if (matches.length > maxResults) {
        var more = document.createElement('li');
        more.style.color = '#999';
        more.textContent = '\u2026 and ' + (matches.length - maxResults) + ' more \u2014 type to narrow';
        resultsList.appendChild(more);
      }
      resultsList.style.display = 'block';
    }

    function doSelect(key) {
      resultsList.style.display = 'none';
      var result = cfg.onSelect(key);
      if (!result) return;
      if (result.displayValue !== undefined) searchBox.value = result.displayValue;
      var url = new URL(window.location);
      url.searchParams.delete('q');
      url.searchParams.delete('name');
      url.searchParams.delete('id');
      url.searchParams.set('name', key);
      if (result.urlParams) {
        for (var k in result.urlParams) {
          if (result.urlParams.hasOwnProperty(k)) url.searchParams.set(k, result.urlParams[k]);
        }
      }
      history.pushState(null, '', url);
      showShare();
    }

    searchBox.addEventListener('input', function() {
      var q = this.value.trim().toLowerCase();
      if (q.length < 2) { resultsList.style.display = 'none'; return; }
      var matches = cfg.filterItems(q);
      showResults(matches);
      var url = new URL(window.location);
      url.searchParams.set('q', this.value.trim());
      url.searchParams.delete('name');
      url.searchParams.delete('id');
      history.replaceState(null, '', url);
    });

    searchBox.addEventListener('keydown', function(e) {
      var items = resultsList.querySelectorAll('li[data-key]');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = Math.min(activeIdx + 1, items.length - 1);
        items.forEach(function(li, i) { li.classList.toggle('active', i === activeIdx); });
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = Math.max(activeIdx - 1, 0);
        items.forEach(function(li, i) { li.classList.toggle('active', i === activeIdx); });
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (activeIdx >= 0 && items[activeIdx]) doSelect(items[activeIdx].dataset.key);
      } else if (e.key === 'Escape') {
        resultsList.style.display = 'none';
      }
    });

    document.addEventListener('click', function(e) {
      if (!searchBox.contains(e.target) && !resultsList.contains(e.target)) {
        resultsList.style.display = 'none';
      }
    });

    return {
      /** Call after data is loaded to activate the page. */
      activate: function() {
        document.getElementById(cfg.loadingId).style.display = 'none';
        searchBox.style.display = '';
        var params = new URLSearchParams(window.location.search);
        var resolved = cfg.resolveFromUrl(params);
        if (resolved && resolved.key) {
          searchBox.value = resolved.displayValue;
          cfg.onSelect(resolved.key);
          showShare();
        } else {
          var q = (resolved && resolved.search) || params.get('q');
          if (q) {
            searchBox.value = q;
            searchBox.dispatchEvent(new Event('input'));
          }
        }
      },
      select: doSelect,
      showShare: showShare
    };
  }

  return {
    escHtml: escHtml,
    cleanName: cleanName,
    badgeHtml: badgeHtml,
    card: card,
    initSearch: initSearch
  };
})();
</script>
