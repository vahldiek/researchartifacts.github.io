<!-- Favicon — uses embedded @media (prefers-color-scheme) to follow OS preference -->
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/assets/images/favicon.svg' | relative_url }}">

<!-- Alpine.js x-cloak: hide elements until Alpine initializes -->
<style>[x-cloak] { display: none !important; }</style>

<!-- Prevent FOUC: apply saved theme before any paint -->
<script>
(function() {
  var t = localStorage.getItem('reprodb-theme');
  if (t === 'dark' || t === 'light') {
    document.documentElement.setAttribute('data-theme', t);
  } else {
    document.documentElement.setAttribute('data-theme',
      window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  }
})();
</script>

<!-- Content Security Policy
     Allows: self-hosted assets, inline scripts/styles (used by Minimal Mistakes
     theme + per-page data-loading scripts), CDN-hosted Tabulator / ECharts /
     Alpine.js / flag-icons, and HTTPS images.
     Note: unsafe-eval is required by Alpine.js for expression evaluation. -->
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net;
               style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com;
               font-src 'self' https://cdn.jsdelivr.net https://fonts.gstatic.com data:;
               img-src 'self' data: https:;
               connect-src 'self' https://cdn.jsdelivr.net;
               object-src 'none';
               base-uri 'self';
               form-action 'self'">

<!-- ReproDB shared assets (utils, table helpers) — loaded synchronously so
     inline page scripts can reference window.ReproDB during parsing. -->
<link rel="stylesheet" href="{{ '/assets/css/reprodb-table.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/reprodb-controls.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/reprodb-search.css' | relative_url }}">
<script src="{{ '/assets/js/reprodb-utils.js' | relative_url }}"></script>

<!-- Tabulator 6 — sortable / paginated / filterable tables -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tabulator-tables@6/dist/css/tabulator_simple.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/tabulator-tables@6/dist/js/tabulator.min.js"></script>

{% unless page.skip_chartjs %}
<!-- ECharts 5 — charts + heatmaps (replaces Chart.js) -->
<link rel="stylesheet" href="{{ '/assets/css/reprodb-charts.css' | relative_url }}">
<script defer src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
{% endunless %}

<!-- Alpine.js 3 — reactive UI bindings. Must load LAST among deferred
     scripts so Tabulator + ECharts are available when Alpine processes
     x-data directives and calls component boot() functions. -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
