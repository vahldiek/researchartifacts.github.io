<!-- Favicon — uses embedded @media (prefers-color-scheme) to follow OS preference -->
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/assets/images/favicon.svg' | relative_url }}">

<!-- Prevent FOUC: apply saved theme before any paint -->
<script>
(function() {
  var t = localStorage.getItem('reprodb-theme');
  if (t === 'dark' || t === 'light') {
    document.documentElement.setAttribute('data-theme', t);
  }
})();
</script>

<!-- Content Security Policy
     Allows: self-hosted assets, inline scripts/styles (used by Minimal Mistakes
     theme + per-page data-loading scripts), CDN-hosted Chart.js / flag-icons,
     and HTTPS images. -->
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
               style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com;
               font-src 'self' https://cdn.jsdelivr.net https://fonts.gstatic.com data:;
               img-src 'self' data: https:;
               connect-src 'self';
               object-src 'none';
               base-uri 'self';
               form-action 'self';
               frame-ancestors 'self'">

<!-- ReproDB shared assets (utils, table widget) -->
<link rel="stylesheet" href="{{ '/assets/css/reprodb-table.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/reprodb-controls.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/reprodb-search.css' | relative_url }}">
<script src="{{ '/assets/js/reprodb-utils.js' | relative_url }}" defer></script>
<script src="{{ '/assets/js/reprodb-table.js' | relative_url }}" defer></script>
<script src="{{ '/assets/js/reprodb-ranking.js' | relative_url }}" defer></script>

{% unless page.skip_chartjs %}
<!-- Chart.js v4 + datalabels plugin (CDN) — skipped on data-table-only pages -->
<link rel="stylesheet" href="{{ '/assets/css/reprodb-charts.css' | relative_url }}">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script>
// Disable datalabels globally — opt-in per chart via plugins.datalabels.display
ChartDataLabels && Chart.register(ChartDataLabels);
Chart.defaults.plugins.datalabels = { display: false };
</script>
{% endunless %}
