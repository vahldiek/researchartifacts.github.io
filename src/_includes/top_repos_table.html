{% comment %}
  Dynamic top repos table loaded from JSON using Tabulator + Alpine.js.
  Shows top artifact repositories ranked by GitHub stars.

  Required page variables:
    page.top_repos_url  — path to the JSON file (e.g., /assets/data/top_repos.json)
{% endcomment %}

<div x-data="topRepos()" x-init="boot()">
  <div x-show="!loaded" x-ref="loading">
    <em x-text="loadingMsg"></em>
  </div>
  <div x-ref="tableEl" x-show="loaded" x-cloak></div>
</div>

<script>
function topRepos() {
  var escHtml = ReproDB.escHtml;
  var DATA_URL = '{{ page.top_repos_url | relative_url }}';

  function badgeHtml(badges) {
    if (!badges) return '';
    var list = Array.isArray(badges) ? badges : badges.split(',');
    return list.map(function(b) {
      var bl = b.trim().toLowerCase();
      if (!bl) return '';
      var cls = 'badge-available';
      if (bl.indexOf('functional') >= 0) cls = 'badge-functional';
      else if (bl.indexOf('reproduc') >= 0 || bl.indexOf('reusable') >= 0) cls = 'badge-reproducible';
      return '<span class="badge-tag ' + cls + '">' + escHtml(b.trim()) + '</span>';
    }).join(' ');
  }

  return {
    loaded: false,
    loadingMsg: 'Loading repository data\u2026',

    boot: function() {
      var self = this;
      ReproDB.fetchJSON(DATA_URL)
        .then(function(data) { self._initTable(data); })
        .catch(function(err) { self.loadingMsg = 'Error loading data: ' + err; });
    },

    _initTable: function(data) {
      data.sort(function(a, b) { return (b.stars || 0) - (a.stars || 0); });
      data.forEach(function(d, i) { d._rank = i + 1; });

      ReproDB.createTable(this.$refs.tableEl, {
        columns: [
          { title: 'Rank', field: '_rank', sorter: 'number', width: 50 },
          { title: 'Title', field: 'title', sorter: 'string', minWidth: 140, widthGrow: 3,
            formatter: function(cell) {
              var d = cell.getRow().getData();
              var t = escHtml(d.title || '');
              return d.url ? '<a href="' + escHtml(d.url) + '" target="_blank">' + t + '</a>' : t;
            }
          },
          { title: 'Stars', field: 'stars', sorter: 'number', width: 60,
            formatter: function(cell) { return '<strong>' + (cell.getValue() || 0) + '</strong>'; }
          },
          { title: 'Forks', field: 'forks', sorter: 'number', width: 60,
            formatter: function(cell) { return cell.getValue() || 0; }
          },
          { title: 'Conference', field: 'conference', sorter: 'string', width: 80,
            formatter: function(cell) { return escHtml(cell.getValue() || ''); }
          },
          { title: 'Year', field: 'year', sorter: 'number', width: 55 },
          { title: 'Badges', field: 'badges', sorter: 'string', minWidth: 80, widthGrow: 2,
            formatter: function(cell) { return badgeHtml(cell.getValue()); }
          },
          { title: 'Last Active', field: 'last_active', sorter: 'string', width: 90, tooltip: 'Last commit activity',
            formatter: function(cell) { return escHtml(cell.getValue() || ''); }
          }
        ],
        data: data,
        paginationSize: 10,
        initialSort: [{ column: 'stars', dir: 'desc' }]
      });
      this.loaded = true;
      var tbl = this.table;
      this.$nextTick(function() { tbl.redraw(true); });
    }
  };
}
</script>
