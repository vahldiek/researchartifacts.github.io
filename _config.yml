repository: 'reprodb/reprodb.github.io'
url: "https://reprodb.github.io"
baseurl: ""

markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes@4.27.0"
plugins:
  - jekyll-redirect-from
  - jekyll-include-cache

title: ReproDB
name: ReproDB

logo: "/assets/images/logo.svg"
masthead_title: "ReproDB"

# Make stuff in _data accessible
# Collections for organizing content
collections:
  pages:
    output: true
    permalink: /:path

exclude:
  - _data/all_results_cache.yml

# Apply the default layout to all files
defaults:
  - scope:
      path: ""
    values:
      layout: "single"
      classes: "wide"
