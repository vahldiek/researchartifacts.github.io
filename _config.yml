repository: 'reprodb/reprodb.github.io'
# url and baseurl are auto-detected by github-pages gem from the Pages API.
# Do NOT set them here — they differ between org (reprodb.github.io/) and
# forks (e.g. vahldiek.github.io/reprodb.github.io/).

markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes@4.27.0"
plugins:
  - jekyll-redirect-from
  - jekyll-include-cache

title: ReproDB
name: ReproDB

logo: "/assets/images/logo.svg"
masthead_title: "ReproDB"

# Make stuff in _data accessible
# Collections for organizing content
collections:
  pages:
    output: true
    permalink: /:path

# Apply the default layout to all files
defaults:
  - scope:
      path: ""
    values:
      layout: "single"
      classes: "wide"
